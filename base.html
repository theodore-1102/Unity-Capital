<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutanto Capital — PE Secondary Dealflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
{% block body %}{% endblock %}
<script>
  // Pass server data to JS
  window.__SC__ = {
    deals: {{ deals | tojson }},
    myAssets: {{ my_assets | tojson }},
    peDeals: {{ pe_deals | tojson }},
    apiStatus: {{ api_status | tojson }},
    mode: "{{ mode }}",
  };
</script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
